<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MACHINE - SYSTEM ADMIN v18.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --acc: #ffffff; --yel: #ffcc00; --red: #ff3333;
            --dim: #1a1a1a; --font-main: 'Share Tech Mono', monospace;
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg); color: var(--acc);
            font-family: var(--font-main); overflow: hidden; height: 100vh;
            width: 100vw; text-transform: uppercase;
            user-select: none; /* Previene selección de texto */
        }

        /* --- LOGIN --- */
        #lock-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #222 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .passcode-dots { display: flex; gap: 20px; margin-bottom: 40px; }
        .p-dot { width: 16px; height: 16px; border: 1px solid #fff; border-radius: 50%; }
        .p-dot.active { background: #fff; box-shadow: 0 0 15px #fff; }
        .numpad { display: grid; grid-template-columns: repeat(3, 90px); gap: 20px; }
        .n-btn {
            width: 85px; height: 85px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer;
        }
        .n-btn:active { background: white; color: black; }

        /* --- LAYOUT --- */
        #main-ui {
            display: none; grid-template-columns: 380px 1fr 380px;
            grid-template-rows: 70px 120px 1fr 220px;
            height: 100vh; width: 100vw; gap: 10px; padding: 10px; box-sizing: border-box;
        }
        .panel { border: 1px solid var(--acc); background: rgba(10, 10, 10, 0.9); position: relative; overflow: hidden; }
        header { 
            grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 30px; border-bottom: 2px solid var(--acc); font-size: 1.1rem; 
        }

        .header-controls { display: flex; gap: 10px; align-items: center; }

        .search-row { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; padding: 15px; background: rgba(255,255,255,0.03); }
        .search-box { display: flex; flex-direction: column; }
        .search-box label { font-size: 0.7rem; color: var(--yel); margin-bottom: 5px; letter-spacing: 2px; }
        .search-box input { background: #000; color: #fff; border: 1px solid #444; padding: 12px; font-family: inherit; font-size: 1rem; text-align: center; }

        .side-l { grid-row: 3 / 4; display: flex; flex-direction: column; gap: 10px; }
        .viewport { grid-column: 2; grid-row: 3 / 4; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        
        #cctv-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1) contrast(1.2) brightness(0.6); }
        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.5); border: 1px solid #fff; color: #fff;
            padding: 20px 10px; cursor: pointer; z-index: 100;
        }
        .nav-l { left: 10px; } .nav-r { right: 10px; }

        .side-r { grid-row: 3 / 4; display: flex; flex-direction: column; gap: 10px; }
        #map { width: 100%; height: 100%; min-height: 300px; filter: invert(1) hue-rotate(180deg) brightness(0.7); border: 1px solid #444; }

        .footer-panels { grid-column: 1 / -1; display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 10px; }
        .module-title { background: var(--acc); color: #000; font-size: 0.8rem; font-weight: bold; padding: 4px 10px; margin-bottom: 10px; }

        #id-popup {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; background: #fff; color: #000; padding: 30px; display: none; z-index: 5000; border: 10px solid var(--yel);
        }

        .terminal { background: #000; padding: 15px; font-size: 0.8rem; color: #0f0; overflow: hidden; border: 1px solid #222; }
        .chat-intercept { color: var(--yel); border: 1px solid #333; padding: 15px; }

        .scanline { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.05) 50%, transparent); height: 10px; animation: scan 4s infinite linear; pointer-events: none; z-index: 100; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .active-god { --acc: var(--red); }
        .btn-god { background: var(--red); color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; font-family: inherit; }
        .btn-stop { background: #444; color: white; border: 1px solid #666; padding: 8px 15px; cursor: pointer; font-family: inherit; }
        .btn-stop:hover { background: #666; }
    </style>
</head>
<body onclick="startAudio()" oncontextmenu="return false;"> <div id="lock-screen">
        <div style="font-size: 1.2rem; letter-spacing: 10px; margin-bottom: 40px;">THE MACHINE - CORE ACCESS</div>
        <div class="passcode-dots" id="dots-container"><div class="p-dot"></div><div class="p-dot"></div><div class="p-dot"></div><div class="p-dot"></div></div>
        <div class="numpad">
            <div class="n-btn" onclick="press('1')">1</div><div class="n-btn" onclick="press('2')">2</div><div class="n-btn" onclick="press('3')">3</div>
            <div class="n-btn" onclick="press('4')">4</div><div class="n-btn" onclick="press('5')">5</div><div class="n-btn" onclick="press('6')">6</div>
            <div class="n-btn" onclick="press('7')">7</div><div class="n-btn" onclick="press('8')">8</div><div class="n-btn" onclick="press('9')">9</div>
            <div></div><div class="n-btn" onclick="press('0')">0</div>
        </div>
    </div>

    <div id="main-ui">
        <header class="panel">
            <div id="status">SISTEMA: VIGILANCIA_MASIVA_ACTIVA</div>
            <div style="color: var(--yel)">ADMIN: MUHAMED</div>
            <div class="header-controls">
                <button class="btn-stop" onclick="stopTTS()">SILENCIAR VOZ</button>
                <button class="btn-god" onclick="toggleGod()">MODO DIOS</button>
            </div>
            <div id="clock">00:00:00:00</div>
        </header>

        <div class="search-row">
            <div class="search-box"><label>BUSCAR PERSONA</label><input type="text" id="s-person" onkeydown="if(event.key==='Enter') findPerson()"></div>
            <div class="search-box"><label>INTERCEPTAR TELÉFONO</label><input type="text" id="s-phone" onkeydown="if(event.key==='Enter') findPhone()"></div>
            <div class="search-box"><label>RASTREAR MATRÍCULA</label><input type="text" id="s-plate" onkeydown="if(event.key==='Enter') findPlate()"></div>
        </div>

        <aside class="side-l">
            <div class="panel module" style="flex: 1.5"><div class="module-title">DETECCIÓN_FACIAL</div><div id="face-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 5px;"></div></div>
            <div class="panel module" style="flex: 1; text-align: center;">
                <div class="module-title">HUELLA_DACTILAR</div>
                <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="0.3" style="opacity: 0.8; margin-top: 5px;"><path d="M12 11c-2 0-3 1-3 3s1 3 3 3 3-1 3-3-1-3-3-3zM12 7c-4 0-6 2-6 7s2 7 6 7 6-2 6-7-2-7-6-7zM12 3c-6 0-9 3-9 11s3 11 9 11 9-3 9-11-3-11-9-11z"/><path d="M12 15c-1 0-1.5.5-1.5 1.5s.5 1.5 1.5 1.5 1.5-.5 1.5-1.5-.5-1.5-1.5-1.5z"/></svg>
            </div>
        </aside>

        <main class="panel viewport">
            <div class="scanline"></div>
            <button class="nav-arrow nav-l" onclick="changeCam(-1)">&#10094;</button>
            <img id="cctv-img" src="">
            <button class="nav-arrow nav-r" onclick="changeCam(1)">&#10095;</button>
            <div id="loc-tag" style="position: absolute; bottom: 20px; left: 20px; background: #fff; color: #000; padding: 5px 15px; font-weight: bold; z-index: 1000;">FEED_CCTV: SECTOR_RESTRICTED</div>

            <div id="id-popup">
                <div style="display: flex; gap: 30px;">
                    <img id="pop-img" style="width: 150px; height: 150px; border: 2px solid #000; object-fit: cover;">
                    <div style="flex: 1;"><h2 id="pop-name" style="margin: 0;"></h2><span id="pop-risk" style="background: red; color: #fff; padding: 3px 10px; font-weight: bold;"></span><div id="pop-bio" style="margin-top: 15px; font-size: 0.9rem; line-height: 1.4;"></div></div>
                </div>
                <button onclick="closePop()" style="width: 100%; margin-top: 20px; padding: 10px; background: #000; color: #fff; cursor: pointer;">CERRAR</button>
            </div>
        </main>

        <aside class="side-r">
            <div class="panel module" style="display: flex; flex-direction: column;">
                <div class="module-title">GEO_LOCALIZACIÓN</div>
                <div id="map" style="flex: 1;"></div>
                <div id="coords" style="font-size: 0.8rem; margin-top: 5px; color: var(--yel); text-align: center; background: #000;">LAT: 40.7128 | LON: -74.0060</div>
            </div>
            <div class="panel module" style="text-align: center;"><div class="module-title">AMENAZA</div><h1 id="threat-pct" style="font-size: 3rem; margin: 10px 0; color: var(--red);">02%</h1></div>
        </aside>

        <footer class="footer-panels">
            <div class="terminal panel" id="term-logs"></div>
            <div class="chat-intercept panel" id="chat-logs"><div id="chat-stream" style="font-size: 0.8rem;"></div></div>
            <div class="terminal panel" style="color: var(--yel);">CPU: <span id="cpu-val">94%</span> | MEM: 88%</div>
        </footer>
    </div>

    <script>
        // --- BLOQUEO DE INSPECCIÓN ---
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; // F12
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Ctrl+Shift+I
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; // Ctrl+Shift+C
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Ctrl+Shift+J
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U
        };

        let pin = "", map, audioCtx;
        const cctvImages = [
            "https://images.unsplash.com/photo-1557597774-9d2739f85a94?q=80&w=1200",
            "https://images.unsplash.com/photo-1449824913935-59a10b8d2000?q=80&w=1200",
            "https://images.unsplash.com/photo-1519010470956-6d877008eaa4?q=80&w=1200"
        ];
        let curImg = 0;

        function press(n) {
            if(pin.length < 4) {
                pin += n;
                document.querySelectorAll('.p-dot').forEach((d, i) => d.classList.toggle('active', i < pin.length));
                beep(600, 0.05);
                if(pin === "7365") unlock();
                else if(pin.length === 4) setTimeout(() => { pin = ""; document.querySelectorAll('.p-dot').forEach(d => d.classList.remove('active')); }, 500);
            }
        }

        function unlock() {
            speak("Acceso confirmado. Bienvenido Muhamed.");
            gsap.to("#lock-screen", { y: "-100%", duration: 1, onComplete: initMachine });
        }

        function initMachine() {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'grid';
            document.getElementById('cctv-img').src = cctvImages[0];
            
            setTimeout(() => {
                if(!map) {
                    map = L.map('map', { 
                        zoomControl: false,
                        attributionControl: false 
                    }).setView([40.7128, -74.0060], 13);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                }
                setTimeout(() => map.invalidateSize(), 200);
            }, 500);

            runLogs(); updateFaces();
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString();
                document.getElementById('cpu-val').innerText = (90 + Math.random()*8).toFixed(1) + "%";
            }, 100);
        }

        function stopTTS() {
            window.speechSynthesis.cancel();
        }

        function changeCam(dir) {
            curImg = (curImg + dir + cctvImages.length) % cctvImages.length;
            document.getElementById('cctv-img').src = cctvImages[curImg];
            beep(800, 0.05);
        }

        function findPerson() {
            const val = document.getElementById('s-person').value;
            if(!val) return;
            showId(val, "RELEVANTE", `Activo ${val} triangulado. Localización: Sector 7.`, `https://i.pravatar.cc/150?u=${val}`);
            speak(`Objetivo localizado: ${val}. Analizando metadatos.`);
            moveMap();
        }

        function findPhone() {
            const val = document.getElementById('s-phone').value;
            if(!val) return;
            document.getElementById('chat-stream').innerHTML = "INTERCEPTANDO...<br>> Sujeto: Confirmado.";
            speak(`Rastreando número ${val}.`);
            moveMap();
        }

        function findPlate() {
            const val = document.getElementById('s-plate').value;
            if(!val) return;
            showId(`PLACA: ${val}`, "VIGILANCIA", "Vehículo sospechoso detectado.", "https://images.unsplash.com/photo-1542362567-b05503f3f5f4?q=80&w=200");
            speak(`Matrícula ${val} identificada.`);
            moveMap();
        }

        function moveMap() {
            if(!map) return;
            const rLat = (40.7 + Math.random()*0.1).toFixed(4);
            const rLon = (-74.0 + Math.random()*0.1).toFixed(4);
            map.flyTo([rLat, rLon], 15);
            document.getElementById('coords').innerText = `LAT: ${rLat} | LON: ${rLon}`;
            changeCam(1);
        }

        function showId(name, risk, bio, img) {
            const p = document.getElementById('id-popup');
            document.getElementById('pop-name').innerText = name;
            document.getElementById('pop-risk').innerText = risk;
            document.getElementById('pop-bio').innerText = bio;
            document.getElementById('pop-img').src = img;
            p.style.display = 'block';
            gsap.from(p, { scale: 0.5, opacity: 0, duration: 0.5 });
        }

        function closePop() { document.getElementById('id-popup').style.display = 'none'; }

        function updateFaces() {
            const g = document.getElementById('face-grid'); g.innerHTML = "";
            for(let i=0; i<6; i++) {
                const img = document.createElement('img');
                img.style = "width:100%; height:80px; object-fit:cover; filter:grayscale(1); border: 1px solid #444;";
                img.src = `https://i.pravatar.cc/100?u=${Math.random()}`;
                g.appendChild(img);
            }
        }

        function runLogs() {
            const l = ["Analizando metadatos...", "Conexión satélite.", "Triangulación GSM..."];
            setInterval(() => {
                const t = document.getElementById('term-logs');
                const d = document.createElement('div');
                d.innerText = `> ${l[Math.floor(Math.random()*l.length)]}`;
                t.prepend(d); if(t.childNodes.length > 10) t.lastChild.remove();
            }, 3000);
        }

        function startAudio() { if(!audioCtx) audioCtx = new AudioContext(); }
        function beep(f, d) { if(!audioCtx) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.frequency.value = f; o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.05, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime + d); }
        
        function speak(t) { 
            window.speechSynthesis.cancel(); 
            const s = new SpeechSynthesisUtterance(t); 
            s.lang = 'es-ES'; 
            s.rate = 0.9;
            window.speechSynthesis.speak(s); 
        }

        function toggleGod() { 
            document.body.classList.toggle('active-god'); 
            const msg = document.body.classList.contains('active-god') ? "Modo Dios activado." : "Modo normal.";
            speak(msg); 
        }
    </script>
</body>
</html>
